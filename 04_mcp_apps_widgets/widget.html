<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classroom Widget</title>
    <style>
      body { margin: 0; padding: 16px; font: 16px system-ui; background: #eef4ff; color: #17213a; }
      main { max-width: 420px; padding: 20px; border-radius: 18px; background: white; box-shadow: 0 8px 30px #19376922; }
      h2 { margin: 0 0 12px; color: #3157d5; }
      .value { font-size: 36px; font-weight: 750; }
      .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
      .day { padding: 7px 2px; border-radius: 8px; text-align: center; background: #eef4ff; }
    </style>
  </head>

    <main id="widget">Waiting for tool data...</main>
